name: Project Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

env:
  FLUTTER_VERSION: "3.41.9"

jobs:
  flutter-format:
    name: Flutter Format
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Check formatting
        run: dart format --set-exit-if-changed .

  flutter-analyze:
    name: Flutter Analyze
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Analyze
        run: flutter analyze

  flutter-test:
    name: Flutter Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - name: Restore dependencies
        run: flutter pub get

      - name: Test
        run: flutter test

  architecture-layers:
    name: Architecture Layers
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check architecture layers
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/architecture_guard.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"

  test-import-guard:
    name: Test Import Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check test/debug imports
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/test_import_guard.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"

  sdk-leak-guard:
    name: SDK Leak Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check SDK/plugin leaks
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/sdk_leak_guard.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"

  secret-guard:
    name: Secret Guard
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check secrets
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/secret_guard.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"

  naming-report:
    name: Naming Report
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Report naming recommendations
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/naming_report.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"
