name: Flutter Checks

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  validate:
    name: Format, Analyze, Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: "3.41.9"
          channel: stable
          cache: true

      - name: Show Flutter version
        run: flutter --version

      - name: Restore dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --set-exit-if-changed .

      - name: Architecture guard
        env:
          GUARD_BASE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.base.sha || github.event.before }}
          GUARD_HEAD_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
        run: python tools/ci/architecture_guard.py --base "$GUARD_BASE_SHA" --head "$GUARD_HEAD_SHA"

      - name: Analyze
        run: flutter analyze

      - name: Test
        run: flutter test
